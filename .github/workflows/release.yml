name: Build APK & Release

# Manually triggered: builds the debug APK and publishes it as a GitHub release.
on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag (e.g. v1.0)"
                required: true
                default: "v1.0"
            prerelease:
                description: "Mark as pre-release?"
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Install SDK packages
              run: sdkmanager "platforms;android-33" "build-tools;35.0.0"

            - name: Build debug APK
              run: |
                  chmod +x gradlew
                  ./gradlew assembleDebug -Pbtv=35.0.0 --no-daemon

            - name: Stage APK
              run: cp app/build/outputs/apk/debug/app-debug.apk "RMSTok-${{ inputs.tag }}.apk"

            - name: Create release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ inputs.tag }}" "RMSTok-${{ inputs.tag }}.apk" \
                    --title "RMSTok Android ${{ inputs.tag }}" \
                    --notes "RMSTok Android client. Sideload the APK and open it on TikTok." \
                    ${{ inputs.prerelease == true && '--prerelease' || '--latest' }}
